<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Textron Live Monitor</title>
<style>
:root{
  --bg:#1c2334;
  --panel:rgba(13,18,32,.9);
  --card:rgba(255,255,255,.045);
  --card-hi:rgba(255,255,255,.09);
  --border:rgba(255,255,255,.09);
  --border-hi:rgba(255,255,255,.18);
  --text:#f2f5fc;
  --muted:#9aa6c4;
  --faint:#68739a;
  --lime:#d7f463;
  --lime-soft:rgba(215,244,99,.14);
  --pink:#ff7eb6;
  --yellow:#ffd166;
  --blue:#8fb8ff;
  --mint:#7ee2c3;
  --violet:#c59bff;
  --amber:#ffbf73;
  --red:#ff8a9d;
  --mono:SFMono-Regular,Menlo,Monaco,Consolas,monospace;
  --sans:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{
  margin:0;min-height:100vh;color:var(--text);font-family:var(--sans);
  background:linear-gradient(160deg,#252e48,#181f30 70%);
  -webkit-font-smoothing:antialiased;display:flex;
}
#bg{position:fixed;inset:0;width:100vw;height:100vh;z-index:0;display:block;pointer-events:none}
.rail,.main{position:relative;z-index:1}

/* ── left icon rail ── */
.rail{
  width:76px;flex:0 0 76px;height:100vh;position:sticky;top:0;
  background:linear-gradient(180deg,#8694b7,#6d7ca3);
  display:flex;flex-direction:column;align-items:center;padding:22px 0;gap:34px;
}
.rail-logo{width:34px;height:34px;display:grid;place-items:center}
.rail-icons{display:flex;flex-direction:column;gap:14px;flex:1}
.ricon{
  width:46px;height:46px;border-radius:50%;border:0;cursor:pointer;
  display:grid;place-items:center;color:#eef2fb;background:transparent;
  transition:background .15s,transform .15s;
}
.ricon:hover{background:rgba(255,255,255,.22)}
.ricon.active{background:#fff;color:#33405f;box-shadow:0 8px 20px rgba(20,28,50,.35)}
.ricon svg{width:20px;height:20px}
.rail-bottom{display:flex;flex-direction:column;align-items:center;gap:12px}
.avatar{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,#d7f463,#8fb8ff);
  display:grid;place-items:center;color:#1c2334;font-weight:800;font-size:17px;
  border:2px solid rgba(255,255,255,.65);
}

/* ── main column ── */
.main{flex:1;min-width:0;padding:0 44px 64px}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 4px 18px;border-bottom:1px solid var(--border);margin-bottom:34px;
}
.net-chip{display:flex;align-items:center;gap:12px}
.avatar-sm{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#d7f463,#8fb8ff);
  display:grid;place-items:center;color:#1c2334;font-weight:800;font-size:15px;
}
.net-name{font-weight:700;font-size:15px}
.net-sub{font-size:12px;color:var(--muted);margin-top:1px}
.top-right{display:flex;align-items:center;gap:16px}
.clock{font-family:var(--mono);font-size:12px;color:var(--faint)}
.live-pill{
  height:40px;border-radius:999px;background:rgba(0,0,0,.35);border:1px solid var(--border);
  display:inline-flex;align-items:center;gap:9px;padding:0 16px;font-size:13px;font-weight:600;
}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.live{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 4px rgba(215,244,99,.18);animation:pulse 1.6s infinite}

/* ── hero ── */
.hero{display:flex;align-items:flex-end;justify-content:space-between;gap:32px;flex-wrap:wrap;margin-bottom:22px}
h1{margin:0;font-size:44px;line-height:1.02;font-weight:700;letter-spacing:-.02em;color:#fff;text-shadow:0 4px 30px rgba(20,30,60,.6)}
.kpis{display:flex;gap:44px;flex-wrap:wrap}
.kpi .k{font-size:13px;color:var(--muted);font-weight:500;margin-bottom:6px}
.kpi .v{font-size:20px;font-weight:600;color:#cdd8f2;font-family:var(--mono)}
.kpi .v em{font-style:normal;color:var(--lime)}

/* ── layout ── */
.layout{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:26px;align-items:start}
.col-main{min-width:0;display:flex;flex-direction:column;gap:22px}
.col-side{position:sticky;top:20px;display:flex;flex-direction:column;gap:18px;max-height:calc(100vh - 40px);overflow:auto;padding-right:2px}

/* ── panels ── */
.panel,.spanel{
  background:var(--panel);border:1px solid var(--border);border-radius:18px;
  box-shadow:0 24px 60px rgba(8,12,24,.35);
}
.panel{padding:22px 24px}
.spanel{padding:20px 22px}
.sp-title{font-size:17px;font-weight:700;margin-bottom:14px;letter-spacing:-.01em}
.panel-meta{font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:12px}
.panel-meta b{color:var(--muted)}
.mono-line{font-family:var(--mono);font-size:12px;color:var(--muted);margin:0 0 14px;word-break:break-all;line-height:1.7}
.mono-line em{font-style:normal;color:var(--lime)}

/* ── graph (canvas) ── */
.graph{
  position:relative;border:1px solid var(--border);border-radius:14px;overflow:auto;
  max-height:74vh;
  background:
    radial-gradient(720px 420px at 50% 38%,rgba(140,170,255,.07),transparent 70%),
    rgba(0,0,0,.30);
  padding:14px;
}
.graph canvas{display:block;cursor:crosshair}
.gtip{
  display:none;position:absolute;z-index:6;pointer-events:none;
  background:rgba(8,12,24,.94);border:1px solid var(--border-hi);border-radius:10px;
  padding:10px 12px;font:11px var(--mono);color:#dbe4f8;line-height:1.7;
  max-width:300px;white-space:pre-wrap;box-shadow:0 14px 40px rgba(0,0,0,.5);
}
.gtip b{color:var(--lime)}
.graph-foot{font:10px var(--mono);color:var(--faint);margin-top:10px}

/* ── findings table ── */
.f-head,.f-row{display:grid;grid-template-columns:86px 1fr auto;gap:10px;align-items:center}
.f-head{font-size:12px;color:var(--faint);padding:0 2px 10px;border-bottom:1px dashed var(--border)}
.f-row{padding:11px 2px;border-bottom:1px dashed rgba(255,255,255,.05);font-size:13px}
.f-row:last-of-type{border-bottom:0}
.f-time{color:var(--muted);font-family:var(--mono);font-size:11px}
.f-net{font-family:var(--mono);font-size:12px;color:#cdd8f2}
.f-status{display:inline-flex;align-items:center;gap:7px;color:var(--muted);font-size:12px;min-width:74px}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.dot-done{background:var(--lime);box-shadow:0 0 6px rgba(215,244,99,.6)}
.dot-failed{background:var(--pink);box-shadow:0 0 6px rgba(255,126,182,.6)}
.dot-running{background:var(--yellow);box-shadow:0 0 6px rgba(255,209,102,.6);animation:pulse 1.2s infinite}
.dot-other{background:var(--faint)}
.big-btn{
  width:100%;margin-top:16px;height:46px;border:0;border-radius:999px;
  background:#fff;color:#141c2e;font-size:14px;font-weight:700;cursor:pointer;
  transition:transform .12s,box-shadow .12s;
}
.big-btn:hover{transform:translateY(-1px);box-shadow:0 10px 24px rgba(0,0,0,.4)}

/* ── overview ── */
.ov-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.live-badge{background:var(--lime);color:#141c2e;font-size:12px;font-weight:800;padding:4px 10px;border-radius:6px}
.ov-sub{font-size:12px;color:var(--faint);margin-bottom:8px}
.ov-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px dashed rgba(255,255,255,.06);font-size:13px}
.ov-row:last-child{border-bottom:0}
.ov-k{color:var(--faint)}
.ov-v{color:#e6ecf9;font-weight:600;font-family:var(--mono);font-size:12px;text-align:right;word-break:break-all}

/* ── reward bars ── */
.bars-sub{font-size:12px;color:var(--faint);margin:-6px 0 12px}
.bars-axis{display:flex;justify-content:space-between;font:10px var(--mono);color:var(--faint);margin-top:6px}
.mc-legend{display:flex;gap:14px;flex-wrap:wrap;margin:2px 0 10px}
.mc-key{display:inline-flex;align-items:center;gap:6px;font:11px var(--mono);color:var(--muted)}
.mc-key i{width:14px;height:3px;border-radius:2px;display:inline-block}
.mc-key b{color:#dbe4f8;font-weight:700}

/* ── step cards ── */
.steps{display:grid;grid-template-columns:1fr 1.5fr 1fr;gap:18px;margin-top:14px}
.step{background:rgba(22,28,46,.92);border:1px solid var(--border);border-radius:14px;padding:20px 22px;position:relative;min-height:96px}
.step .tab{position:absolute;top:-25px;left:16px;font-size:12px;font-weight:700;padding:5px 13px;border-radius:6px 6px 0 0}
.step.done .tab{background:#fff;color:#141c2e}
.step.failed .tab{background:var(--pink);color:#2a1020}
.step.active{background:var(--card-hi);border-color:var(--border-hi);box-shadow:0 22px 48px rgba(0,0,0,.45)}
.step.active .tab{background:var(--blue);color:#0e1730}
.step.pending .tab{background:rgba(255,255,255,.14);color:var(--muted)}
.step-title{display:flex;align-items:center;gap:10px;font-size:17px;font-weight:700}
.step-title svg{width:18px;height:18px;color:var(--muted)}
.step-time{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted)}
.step-sub{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.6;word-break:break-all}

/* ── diag details ── */
.diag-details{padding:0;overflow:hidden}
.diag-details>summary{cursor:pointer;list-style:none;padding:16px 22px;font-weight:700;font-size:14px;border-bottom:1px solid transparent;user-select:none}
.diag-details>summary::-webkit-details-marker{display:none}
.diag-details>summary:after{content:"＋";float:right;color:var(--faint);font-weight:700}
.diag-details[open]>summary:after{content:"−"}
.diag-details[open]>summary{border-bottom-color:var(--border)}
.diag-body{padding:16px 22px}
.bw-header{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.bw-status{font-size:12px;font-weight:700;padding:6px 13px;border-radius:999px;border:1px solid transparent}
.bw-status-done{background:var(--lime-soft);color:var(--lime);border-color:rgba(215,244,99,.3)}
.bw-status-running{background:rgba(255,209,102,.12);color:var(--yellow);border-color:rgba(255,209,102,.3)}
.bw-status-failed{background:rgba(255,126,182,.12);color:var(--pink);border-color:rgba(255,126,182,.3)}
.bw-time{font-size:12px;color:var(--faint)}
.bw-network{font-size:11px;color:var(--muted);font-family:var(--mono);padding:5px 10px;border-radius:999px;background:var(--card);border:1px solid var(--border)}
.bw-kv{display:inline-flex;align-items:center;gap:5px;margin:0 8px 6px 0;font-size:12px;padding:6px 10px;border-radius:999px;background:var(--card);border:1px solid var(--border)}
.bw-kv-key{color:var(--faint)}
.bw-kv-val{color:#dbe4f8;font-weight:700}
.bw-kv-val-good{color:var(--lime)}
.bw-kv-val-warn{color:var(--yellow)}
.bw-kv-val-bad{color:var(--pink)}
.bw-bar-wrap{display:inline-block;width:82px;height:7px;background:rgba(255,255,255,.08);border-radius:999px;vertical-align:middle;margin:0 4px;overflow:hidden}
.bw-bar-fill{display:block;border-radius:999px;height:100%}
.bw-bar-high{background:linear-gradient(90deg,#9dbb3a,var(--lime))}
.bw-bar-medium{background:linear-gradient(90deg,#b98a2e,var(--yellow))}
.bw-bar-low{background:linear-gradient(90deg,#b0466e,var(--pink))}
.bw-row{font-size:13px;color:var(--muted);margin:6px 0;display:flex;flex-wrap:wrap;align-items:center;gap:6px 10px}
.bw-section{margin:14px 0 0;padding:12px 0 0;border-top:1px solid var(--border)}
.bw-section-label{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.09em;margin-bottom:9px;font-weight:700}
.bw-path-seg{font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:999px;padding:4px 8px}
.bw-rationale{font-size:13px;color:#e4f0b0;background:var(--lime-soft);padding:10px 12px;border-radius:12px;margin:10px 0;border:1px solid rgba(215,244,99,.22);border-left:3px solid var(--lime)}
.bw-changes{font-family:var(--mono);font-size:11px;color:var(--muted);margin:5px 0;padding-left:10px;border-left:2px solid rgba(255,255,255,.14);line-height:1.7}
.log{font:11px var(--mono);color:var(--muted);white-space:pre-wrap;line-height:1.65;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:rgba(0,0,0,.28)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:999px;border:2px solid transparent;background-clip:content-box}
::-webkit-scrollbar-track{background:transparent}

@media(max-width:1180px){
  .layout{grid-template-columns:1fr}
  .col-side{position:static;max-height:none;overflow:visible}
  h1{font-size:40px}
  .steps{grid-template-columns:1fr}
  .main{padding:0 22px 48px}
}
@media(max-width:720px){
  .rail{display:none}
  .kpis{gap:24px}
  h1{font-size:32px}
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<nav class="rail" aria-label="Monitor sections">
  <div class="rail-logo">
    <svg viewBox="0 0 32 32" fill="none" aria-hidden="true" width="30" height="30">
      <defs><linearGradient id="rlg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#fff"/><stop offset="1" stop-color="#d7f463"/></linearGradient></defs>
      <path d="M6 8 L16 4 L26 8 L26 18 L16 26 L6 18 Z" fill="url(#rlg)"/>
      <path d="M11 11 L16 9 L21 11 L21 17 L16 21 L11 17 Z" fill="#6d7ca3" opacity=".55"/>
    </svg>
  </div>
  <div class="rail-icons">
    <button class="ricon active" data-target="sec-graph" title="Graph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><circle cx="17.5" cy="17.5" r="3.5"/></svg></button>
    <button class="ricon" data-target="sec-steps" title="Pipeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 13c2-1 3-3 5-3s3 4 5 3 3-5 5-4 2 4 3 5"/></svg></button>
    <button class="ricon" data-target="sec-side" title="Stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20V10M10 20V4M16 20v-6M22 20H2"/></svg></button>
    <button class="ricon" data-target="sec-diag" title="Diagnostics"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="6" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="18" cy="12" r="1.5"/></svg></button>
  </div>
  <div class="rail-bottom"><div class="avatar">T</div></div>
</nav>

<div class="main">
  <header class="topbar">
    <div class="net-chip">
      <div class="avatar-sm">T</div>
      <div>
        <div class="net-name" id="hdr-net">Textron</div>
        <div class="net-sub">trainable textual neural network</div>
      </div>
    </div>
    <div class="top-right">
      <div class="clock" id="hdr-clock"></div>
      <div class="live-pill"><span class="live"></span>Live</div>
    </div>
  </header>

  <div class="hero" id="hero"></div>

  <div class="layout">
    <div class="col-main">
      <div id="graphs"></div>
      <div id="steps-wrap"></div>
      <div id="diag-wrap"></div>
    </div>
    <aside class="col-side" id="side"></aside>
  </div>
</div>

<script>
(function(){
'use strict';
var R=15,GX=230,GY=96,P=64;
var $=function(id){return document.getElementById(id)};
var heroEl=$('hero'),graphsEl=$('graphs'),stepsEl=$('steps-wrap'),diagEl=$('diag-wrap'),sideEl=$('side');
var lastS=null,histExpanded=false;

/* ═══════════════ WebGL background: domain-warped FBM glowing veins ═══════════════ */
var FRAG=[
'precision highp float;',
'uniform vec2 R;uniform float T;',
'float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}',
'float n(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);',
' return mix(mix(h(i),h(i+vec2(1.,0.)),f.x),mix(h(i+vec2(0.,1.)),h(i+vec2(1.,1.)),f.x),f.y);}',
'float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<3;i++){v+=a*n(p);p=p*2.03+vec2(1.7,4.1);a*=.5;}return v;}',
'void main(){',
' vec2 uv=gl_FragCoord.xy/R;',
' vec2 p=uv;p.x*=R.x/R.y;p*=1.7;',
' float t=T*.045;',
' float q=fbm(p+t*.5);',
' float r=fbm(p+2.5*vec2(q,-q)+vec2(1.7,9.2)-t*.3);',
' float f=fbm(p+3.1*vec2(r,q));',
' float vein=pow(1.-abs(2.*f-1.),7.);',
' float vein2=pow(1.-abs(2.*q-1.),9.);',
' float mask=smoothstep(1.05,.25,distance(uv,vec2(.38,.55)));',
' vec3 col=mix(vec3(.070,.090,.150),vec3(.135,.170,.270),smoothstep(.2,.95,f));',
' col+=vein*vec3(.52,.58,.70)*(.10+.26*mask);',
' col+=vein2*vec3(.42,.52,.60)*.08*mask;',
' col+=pow(vein,3.)*vec3(.38,.44,.16)*.10*mask;',
' float d=distance(uv,vec2(.42,.45));',
' col*=1.-d*.55;',
' gl_FragColor=vec4(col,1.);',
'}'].join('\n');

var bgGL=null;
function initBG(){
  var cv=$('bg');
  try{
    var gl=cv.getContext('webgl',{antialias:false,depth:false,stencil:false,alpha:false});
    if(!gl)return;
    function sh(type,src){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);
      if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){console.warn(gl.getShaderInfoLog(s));return null}return s}
    var vs=sh(gl.VERTEX_SHADER,'attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}');
    var fs=sh(gl.FRAGMENT_SHADER,FRAG);
    if(!vs||!fs)return;
    var pr=gl.createProgram();gl.attachShader(pr,vs);gl.attachShader(pr,fs);gl.linkProgram(pr);
    if(!gl.getProgramParameter(pr,gl.LINK_STATUS)){console.warn(gl.getProgramInfoLog(pr));return}
    gl.useProgram(pr);
    var buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
    var loc=gl.getAttribLocation(pr,'a');
    gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
    var uR=gl.getUniformLocation(pr,'R'),uT=gl.getUniformLocation(pr,'T');
    function resize(){
      var w=Math.max(2,(innerWidth*0.35)|0),h=Math.max(2,(innerHeight*0.35)|0);
      if(cv.width!==w||cv.height!==h){cv.width=w;cv.height=h;gl.viewport(0,0,w,h)}
    }
    addEventListener('resize',resize);resize();
    bgGL={draw:function(t){gl.uniform2f(uR,cv.width,cv.height);gl.uniform1f(uT,t);gl.drawArrays(gl.TRIANGLES,0,3)}};
  }catch(e){console.warn('webgl bg disabled',e)}
}

/* ═══════════════ canvas glow sprites ═══════════════ */
function makeGlow(rgba){
  var c=document.createElement('canvas');c.width=c.height=128;
  var g=c.getContext('2d');
  var gr=g.createRadialGradient(64,64,0,64,64,64);
  gr.addColorStop(0,rgba[0]);gr.addColorStop(0.35,rgba[1]);gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=gr;g.fillRect(0,0,128,128);
  return c;
}
var glowWhite=makeGlow(['rgba(215,228,255,.55)','rgba(160,190,255,.18)']);
var glowLime=makeGlow(['rgba(215,244,99,.65)','rgba(190,230,80,.20)']);
var glowBlue=makeGlow(['rgba(143,184,255,.5)','rgba(110,150,255,.16)']);
var glowPink=makeGlow(['rgba(255,126,182,.5)','rgba(255,110,160,.16)']);
var glowMagenta=makeGlow(['rgba(255,140,230,.75)','rgba(200,70,180,.22)']);
var backwardLinger=0; // seconds since last backward event, for fade-out trail

/* ═══════════════ helpers ═══════════════ */
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;')}
function short(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s}
function hash32(s){var h=2166136261;for(var i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0}
function rand01(seed){var x=(seed|0)||1;x^=x<<13;x^=x>>>17;x^=x<<5;return (x>>>0)/4294967296}
function qbezPt(e,t){var u=1-t;return {x:u*u*e.x1+2*u*t*e.cx+t*t*e.x2,y:u*u*e.y1+2*u*t*e.cy+t*t*e.y2}}
function bezCtrl(x1,y1,x2,y2,bend){
  var mx=(x1+x2)/2,my=(y1+y2)/2,dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
  return {x:mx+(-dy/len)*bend,y:my+(dx/len)*bend};
}
function x(layer){return P+layer*GX+GX/2}
function y(nodeId){var i=parseInt(String(nodeId).split('_')[1]||'0',10);return P+i*GY+GY/2}
function qid(layer,id){return 'L'+layer+'::'+id}
function edgeId(layer,from,to){return 'L'+layer+'::'+from+'->L'+(layer+1)+'::'+to}
function relTime(iso){
  if(!iso)return'';
  var t=Date.parse(iso);if(isNaN(t))return iso.slice(11,19);
  var diff=(Date.now()-t)/1000;
  if(diff<10)return'刚刚';
  if(diff<60)return Math.floor(diff)+'秒前';
  if(diff<3600)return Math.floor(diff/60)+'分钟前';
  if(diff<86400)return Math.floor(diff/3600)+'小时前';
  if(diff<172800)return'昨天 '+new Date(t).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  return new Date(t).toLocaleDateString('zh-CN',{month:'short',day:'numeric'})+' '+new Date(t).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
}
function fmtClock(iso){var s=String(iso||'');return s.length>=19?s.slice(5,19).replace('T',' '):s}
function setHTML(el,h){if(el.__last!==h){el.__last=h;el.innerHTML=h}}
function qualityBar(q){
  if(q==null)return'';
  var w=Math.round(q*100);var cls=q>=0.7?'bw-bar-high':q>=0.35?'bw-bar-medium':'bw-bar-low';
  return '<span class="bw-bar-wrap"><span class="bw-bar-fill '+cls+'" style="width:'+w+'%"></span></span>';
}
function kv(label,val,valCls){return '<span class="bw-kv"><span class="bw-kv-key">'+esc(label)+'</span><span class="bw-kv-val'+(valCls?' '+valCls:'')+'">'+esc(String(val))+'</span></span>'}
function diagOpenKey(key){return 'textron.monitor.diag.'+key}
function isDiagOpen(key){
  var el=document.querySelector('details.diag-details[data-diag="'+key+'"]');
  if(el)return !!el.open;
  try{return localStorage.getItem(diagOpenKey(key))==='1'}catch(e){return false}
}
function diagAttrs(key){return ' data-diag="'+key+'" '+(isDiagOpen(key)?'open':'')}
function bindDiagState(){
  var els=document.querySelectorAll('details.diag-details[data-diag]');
  for(var i=0;i<els.length;i++){
    if(els[i].__diagBound)continue;
    els[i].__diagBound=true;
    els[i].addEventListener('toggle',function(){
      try{localStorage.setItem(diagOpenKey(this.getAttribute('data-diag')),this.open?'1':'0')}catch(e){}
    });
  }
}

/* ═══════════════ graph views (persistent canvases) ═══════════════ */
var graphViews={};
var DPR=Math.min(2,window.devicePixelRatio||1);

function ensureGraphView(name,isFirst){
  var gv=graphViews[name];
  if(gv)return gv;
  var panel=document.createElement('div');panel.className='panel';
  if(isFirst)panel.id='sec-graph';
  panel.innerHTML='<div class="panel-meta"></div><div class="mono-line"></div>'+
    '<div class="graph"><canvas></canvas><div class="gtip"></div></div><div class="graph-foot"></div>';
  graphsEl.appendChild(panel);
  var canvas=panel.querySelector('canvas'),tip=panel.querySelector('.gtip'),graph=panel.querySelector('.graph');
  gv=graphViews[name]={
    panel:panel,canvas:canvas,tip:tip,graph:graph,
    ctx:canvas.getContext('2d'),
    meta:panel.querySelector('.panel-meta'),
    path:panel.querySelector('.mono-line'),
    foot:panel.querySelector('.graph-foot'),
    data:null,W:0,H:0,R:15,dpr:1,_sig:'',staticCanvas:null,staticCtx:null
  };
  canvas.addEventListener('mousemove',function(e){onGraphHover(gv,e)});
  canvas.addEventListener('mouseleave',function(){gv.tip.style.display='none'});
  return gv;
}
function onGraphHover(gv,e){
  var d=gv.data;if(!d)return;
  var rect=gv.canvas.getBoundingClientRect();
  var lx=(e.clientX-rect.left)*(gv.W/rect.width),ly=(e.clientY-rect.top)*(gv.H/rect.height);
  var best=null,bd=1e9;
  for(var i=0;i<d.nodes.length;i++){
    var nd=d.nodes[i],dx=nd.cx-lx,dy=nd.cy-ly,ds=dx*dx+dy*dy;
    if(ds<bd){bd=ds;best=nd}
  }
  if(best&&bd<(gv.R+10)*(gv.R+10)){
    gv.tip.innerHTML='<b>'+esc(best.qid)+'</b>'+(best.score!=null?'  score '+Number(best.score).toFixed(3):'')+
      '\nname: '+esc(best.name||'(empty)')+'\ncontext: '+esc(best.context||'(empty)');
    var grect=gv.graph.getBoundingClientRect();
    gv.tip.style.left=(e.clientX-grect.left+gv.graph.scrollLeft+16)+'px';
    gv.tip.style.top=(e.clientY-grect.top+gv.graph.scrollTop+12)+'px';
    gv.tip.style.display='block';
  }else gv.tip.style.display='none';
}

function updateGraphView(name,net,state){
  var gv=ensureGraphView(name,graphsEl.children.length===0);
  var selectedIds=state?(state.currentActivatedIds||[]):[];
  var selectedEdges=state?(state.currentSelectedEdgeIds||[]):[];
  var scores=state?(state.currentActivationScores||{}):{};
  var mutations=state?(state.currentNodeMutations||[]):[];
  var backward=state&&state.lastBackwardState?state.lastBackwardState:null;
  var backwardEdges=!!(backward&&(backward.status==='running'||Number(backward.edgesUpdated||0)>0));
  var selected={},selectedE={},mutationMap={};
  for(var i=0;i<selectedIds.length;i++)selected[selectedIds[i]]=1;
  for(var i=0;i<selectedEdges.length;i++)selectedE[selectedEdges[i]]=1;
  for(var i=0;i<mutations.length;i++)if(mutations[i]&&mutations[i].id)mutationMap[mutations[i].id]=mutations[i];

  var byL={};
  for(var i=0;i<net.nodes.length;i++){var nd=net.nodes[i];if(!byL[nd.layer])byL[nd.layer]=[];byL[nd.layer].push(nd)}
  var layers=net.layers,nL=layers.length,maxN=Math.max.apply(null,layers);

  // ── organic layout: adaptive pitch + deterministic jitter (biological feel) ──
  var GYa=Math.max(52,Math.min(GY,Math.floor(2600/Math.max(1,maxN))));
  var Rv=maxN>30?12:(maxN>18?13:15);
  var W=nL*GX+P*2,H=maxN*GYa+P*2;

  var weights=net.weights||{},edgeWeights={};
  for(var k in weights){
    var m=k.match(/^(\d+)_to_(\d+)$/);if(!m)continue;
    var l=parseInt(m[1],10);edgeWeights[l]=edgeWeights[l]||{};
    for(var j=0;j<weights[k].length;j++){var e=weights[k][j];edgeWeights[l][e.from+'_'+e.to]=e.weight}
  }

  var nodes=[],edges=[],selEdges=[],amb=[],goldReal=0,pos={},moved=[];
  for(var l=0;l<nL;l++){
    var list=byL[l]||[];
    for(var i=0;i<list.length;i++){
      var nd=list[i],id=qid(l,nd.id);
      var seed=hash32(name+'|'+id);
      var mut=mutationMap[id];
      var nd2={qid:id,id:nd.id,layer:l,
        cx:x(l)+(rand01(seed^0x9e37)-0.5)*72,
        cy:P+i*GYa+GYa/2+(rand01(seed^0x51f7)-0.5)*GYa*0.42,
        name:nd.name||'',context:nd.context||nd.content||'',
        filled:!!(nd.name||nd.content),sel:!!selected[id],
        score:scores[id],phase:rand01(seed)*6.283,drift:0.6+rand01(seed^0x77aa)*0.9,
        mutation:mut||null};
      if(mut)moved.push(nd2);
      nodes.push(nd2);pos[l+'|'+nd.id]=nd2;
    }
  }
  for(var l=0;l<nL-1;l++){
    var froms=byL[l]||[],tos=byL[l+1]||[];
    for(var fi=0;fi<froms.length;fi++){
      var fn=froms[fi],p1=pos[l+'|'+fn.id];
      for(var ti=0;ti<tos.length;ti++){
        var tn=tos[ti],wt=edgeWeights[l]&&edgeWeights[l][fn.id+'_'+tn.id];
        if(wt===undefined)continue;
        var p2=pos[(l+1)+'|'+tn.id];
        var c=bezCtrl(p1.cx,p1.cy,p2.cx,p2.cy,(rand01(hash32(name+'|e|'+l+'|'+fn.id+'|'+tn.id))-0.5)*110);
        var e={x1:p1.cx,y1:p1.cy,x2:p2.cx,y2:p2.cy,cx:c.x,cy:c.y,w:wt,
          gold:!!selectedE[edgeId(l,fn.id,tn.id)],ph:rand01(hash32(fn.id+tn.id+l))};
        if(e.gold){goldReal++;selEdges.push(e)}else{edges.push(e);if(Math.abs(wt)>=0.45)amb.push(e)}
      }
    }
  }
  amb.sort(function(a,b){return Math.abs(b.w)-Math.abs(a.w)});
  amb=amb.slice(0,14);

  // phantom dashed route for selected adjacent nodes without a real edge
  var phantom=[];
  for(var l=0;l<nL-1;l++){
    var a=null,b=null;
    for(var si=0;si<selectedIds.length;si++){
      if(selectedIds[si].indexOf('L'+l+'::')===0)a=selectedIds[si].split('::')[1];
      if(selectedIds[si].indexOf('L'+(l+1)+'::')===0)b=selectedIds[si].split('::')[1];
    }
    if(a&&b&&!selectedE[edgeId(l,a,b)]){
      var p1=pos[l+'|'+a],p2=pos[(l+1)+'|'+b];
      if(p1&&p2){var c=bezCtrl(p1.cx,p1.cy,p2.cx,p2.cy,36);
        phantom.push({x1:p1.cx,y1:p1.cy,x2:p2.cx,y2:p2.cy,cx:c.x,cy:c.y})}
    }
  }

  gv.data={nodes:nodes,edges:edges,selEdges:selEdges,amb:amb,phantom:phantom,mutations:moved,backwardEdges:backwardEdges};
  gv.R=Rv;
  var dpr=(W*H>1500000)?1:Math.min(2,window.devicePixelRatio||1);
  if(gv.W!==W||gv.H!==H||gv.dpr!==dpr){
    gv.W=W;gv.H=H;gv.dpr=dpr;
    gv.canvas.width=W*dpr;gv.canvas.height=H*dpr;
    gv.canvas.style.width=W+'px';gv.canvas.style.height=H+'px';
    gv.ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  var wsum=0;for(var wi=0;wi<edges.length;wi++)wsum+=Math.round(edges[wi].w*10000);
  var sig=layers.join(',')+'|'+nodes.length+'|'+edges.length+'|'+selectedIds.join(',')+'|'+wsum;
  if(sig!==gv._sig){gv._sig=sig;renderStatic(gv)}
  gv.meta.innerHTML='Network Graph · <b>'+esc(name)+'</b> · layers ['+layers.join(',')+'] · selected '+selectedIds.length+' · threshold '+net.threshold;
  gv.path.textContent=selectedIds.length?selectedIds.join(' → '):'no selected path';
  var backInfo=backwardEdges?'↩ '+(backward.edgesUpdated||0)+' edges':'';
  gv.foot.textContent='selectedEdges: '+selectedEdges.length+' · real glowing edges: '+goldReal+' · mutations: '+moved.length+' · organic canvas + webgl'+(backInfo?' · '+backInfo:'');
}

/* static synapse layer — rebuilt per poll, blitted per frame (perf) */
function renderStatic(gv){
  var d=gv.data;if(!d)return;
  var sc=gv.staticCanvas;
  if(!sc){sc=gv.staticCanvas=document.createElement('canvas');gv.staticCtx=sc.getContext('2d')}
  if(sc.width!==gv.W*gv.dpr||sc.height!==gv.H*gv.dpr){sc.width=gv.W*gv.dpr;sc.height=gv.H*gv.dpr}
  var g=gv.staticCtx;
  g.setTransform(gv.dpr,0,0,gv.dpr,0,0);
  g.clearRect(0,0,gv.W,gv.H);
  g.lineCap='round';g.textAlign='center';
  for(var i=0;i<d.edges.length;i++){
    var e=d.edges[i],aw=Math.abs(e.w);
    g.strokeStyle=e.w>=0?'rgba(159,180,221,'+(0.06+aw*0.34).toFixed(3)+')':'rgba(255,150,190,'+(0.06+aw*0.34).toFixed(3)+')';
    g.lineWidth=0.5+aw*3;
    g.beginPath();g.moveTo(e.x1,e.y1);g.quadraticCurveTo(e.cx,e.cy,e.x2,e.y2);g.stroke();
    if(aw>=0.35){
      var mp=qbezPt(e,0.5);
      g.fillStyle='rgba(120,132,170,.75)';g.font='8px Menlo,monospace';
      g.fillText(e.w.toFixed(2),mp.x,mp.y-4);
    }
  }
}

function drawGraph(gv,t){
  var d=gv.data;if(!d||!gv.staticCanvas)return;
  var rect=gv.panel.getBoundingClientRect();
  if(rect.bottom<-60||rect.top>innerHeight+60)return; // viewport culling
  var ctx=gv.ctx,Rv=gv.R,i,e,nd;
  ctx.clearRect(0,0,gv.W,gv.H);
  ctx.drawImage(gv.staticCanvas,0,0,gv.W,gv.H);

  // ── additive living layer ──
  ctx.save();
  ctx.globalCompositeOperation='lighter';
  var breathe=0.7+0.3*Math.sin(t*2.1);

  // selected organic path — layered strokes instead of shadowBlur (GPU-cheap glow)
  ctx.lineCap='round';
  for(i=0;i<d.selEdges.length;i++){
    e=d.selEdges[i];
    ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.quadraticCurveTo(e.cx,e.cy,e.x2,e.y2);
    ctx.strokeStyle='rgba(215,244,99,'+(0.10*breathe).toFixed(3)+')';ctx.lineWidth=11;ctx.stroke();
    ctx.strokeStyle='rgba(215,244,99,'+(0.22*breathe).toFixed(3)+')';ctx.lineWidth=6.5;ctx.stroke();
    ctx.strokeStyle='rgba(230,250,140,'+(0.85*breathe).toFixed(3)+')';ctx.lineWidth=3.5;ctx.stroke();
  }

  // phantom dashed route
  if(d.phantom.length){
    ctx.setLineDash([7,5]);ctx.lineDashOffset=-t*22;
    ctx.strokeStyle='rgba(215,244,99,.65)';ctx.lineWidth=3;
    for(i=0;i<d.phantom.length;i++){
      e=d.phantom[i];
      ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.quadraticCurveTo(e.cx,e.cy,e.x2,e.y2);ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  // backward propagation — reverse-direction wave (L2→L1→L0), distinct pink/magenta glow
  if(d.selEdges.length&&(d.backwardEdges||backwardLinger>0)){
    if(d.backwardEdges)backwardLinger=2.2;else backwardLinger=Math.max(0,backwardLinger-1/60);
    var bFade=Math.min(1,backwardLinger/0.8);
    // reverse layer order: build index
    var revEdges=[];
    for(i=0;i<d.selEdges.length;i++){e=d.selEdges[i];var lm=parseInt(e.x1,10)||0;revEdges.push({e:i,ly:lm})}
    revEdges.sort(function(a,b){return b.ly-a.ly});
    ctx.lineCap='round';
    ctx.setLineDash([7,9]);ctx.lineDashOffset=-t*30;
    for(var ri=0;ri<revEdges.length;ri++){
      e=d.selEdges[revEdges[ri].e];
      // reverse wave direction: start at L2 end, travel toward L0
      var rt=((t*0.42+ri*0.19)%1),rp=qbezPt(e,rt);
      // thick glowing band
      ctx.strokeStyle='rgba(255,100,200,'+(0.12*bFade*breathe).toFixed(3)+')';ctx.lineWidth=12;
      ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.quadraticCurveTo(e.cx,e.cy,e.x2,e.y2);ctx.stroke();
      ctx.strokeStyle='rgba(255,140,230,'+(0.50*bFade*breathe).toFixed(3)+')';ctx.lineWidth=5;
      ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.quadraticCurveTo(e.cx,e.cy,e.x2,e.y2);ctx.stroke();
      ctx.strokeStyle='rgba(255,180,245,'+(0.80*bFade*breathe).toFixed(3)+')';ctx.lineWidth=2.6;
      ctx.beginPath();ctx.moveTo(e.x1,e.y1);ctx.quadraticCurveTo(e.cx,e.cy,e.x2,e.y2);ctx.stroke();
      // lead particle (bright)
      ctx.drawImage(glowMagenta,rp.x-18,rp.y-18,36,36);
      ctx.fillStyle='rgba(255,240,255,.95)';ctx.beginPath();ctx.arc(rp.x,rp.y,3,0,6.283);ctx.fill();
      // trailing comet particles
      for(var tr=1;tr<=3;tr++){
        var trt=((rt-tr*0.06+1)%1),trp=qbezPt(e,trt);
        ctx.globalAlpha=0.3*bFade/tr;
        ctx.drawImage(glowMagenta,trp.x-12,trp.y-12,24,24);
      }
      ctx.globalAlpha=1;
    }
    ctx.setLineDash([]);
  }

  if(d.mutations&&d.mutations.length){
    ctx.lineCap='round';
    ctx.setLineDash([5,4]);
    for(i=0;i<d.mutations.length;i++){
      nd=d.mutations[i];
      var mt=nd.mutation&&nd.mutation.type||'update';
      var mutColor='rgba(143,184,255,.82)',mutGlow='rgba(143,184,255,.18)',bend=-32;
      if(mt==='add'){mutColor='rgba(126,226,195,.82)';mutGlow='rgba(126,226,195,.18)';bend=34;}
      else if(mt==='merge'){mutColor='rgba(197,155,255,.84)';mutGlow='rgba(197,155,255,.18)';bend=0;}
      else if(mt==='delete'){mutColor='rgba(255,138,157,.82)';mutGlow='rgba(255,138,157,.18)';bend=56;}
      var x2=Math.max(24,nd.cx-68-nd.layer*4),y2=nd.cy-10,cp=bezCtrl(nd.cx,nd.cy,x2,y2,bend);
      ctx.strokeStyle=mutGlow;ctx.lineWidth=9;
      ctx.beginPath();ctx.moveTo(nd.cx,nd.cy);ctx.quadraticCurveTo(cp.x,cp.y,x2,y2);ctx.stroke();
      ctx.strokeStyle=mutColor;ctx.lineWidth=2.4;
      ctx.beginPath();ctx.moveTo(nd.cx,nd.cy);ctx.quadraticCurveTo(cp.x,cp.y,x2,y2);ctx.stroke();
      var tt=(t*0.42+i*0.13)%1,pp=qbezPt({x1:nd.cx,y1:nd.cy,cx:cp.x,cy:cp.y,x2:x2,y2:y2},tt);
      ctx.drawImage(mt==='add'?glowLime:mt==='merge'?glowBlue:mt==='delete'?glowPink:glowWhite,pp.x-12,pp.y-12,24,24);
    }
    ctx.setLineDash([]);
  }

  // pulses along selected path — signal propagation wavefront
  for(i=0;i<d.selEdges.length;i++){
    e=d.selEdges[i];
    for(var k=0;k<2;k++){
      var tt=(t*0.34+i*0.11+k*0.5)%1,p=qbezPt(e,tt);
      ctx.drawImage(glowLime,p.x-15,p.y-15,30,30);
      ctx.fillStyle='rgba(255,255,240,.95)';
      ctx.beginPath();ctx.arc(p.x,p.y,2.1,0,6.283);ctx.fill();
    }
  }

  // sparse ambient pulses on strong synapses
  for(i=0;i<d.amb.length;i++){
    e=d.amb[i];
    var tt=(t*0.06+e.ph)%1,p=qbezPt(e,tt);
    ctx.globalAlpha=0.55;
    ctx.drawImage(e.w>=0?glowBlue:glowPink,p.x-9,p.y-9,18,18);
    ctx.globalAlpha=1;
  }

  // node glows (drifting positions cached on node)
  for(i=0;i<d.nodes.length;i++){
    nd=d.nodes[i];
    var px=nd.cx+Math.cos(t*0.45*nd.drift+nd.phase*1.3)*2.2;
    var py=nd.cy+Math.sin(t*0.6*nd.drift+nd.phase)*3;
    nd._px=px;nd._py=py;
    if(nd.sel){
      var wave=0.55+0.45*Math.sin(t*2.6-nd.layer*0.9);
      var s=52+22*wave;
      ctx.drawImage(glowLime,px-s/2,py-s/2,s,s);
    }else if(nd.mutation){
      var mt=nd.mutation.type;
      var glow=mt==='add'?glowLime:mt==='merge'?glowBlue:mt==='delete'?glowPink:glowWhite;
      ctx.globalAlpha=mt==='add'?0.95:mt==='merge'?0.88:mt==='delete'?0.82:0.72;
      ctx.drawImage(glow,px-24,py-24,48,48);
      ctx.globalAlpha=1;
    }else if(nd.filled){
      ctx.globalAlpha=nd.score!=null?Math.min(1,0.3+nd.score*0.8):0.45;
      ctx.drawImage(glowWhite,px-22,py-22,44,44);
      ctx.globalAlpha=1;
    }
  }
  ctx.restore();

  // ── cell bodies (membrane wobble on selected) ──
  for(i=0;i<d.nodes.length;i++){
    nd=d.nodes[i];
    var px=nd._px!=null?nd._px:nd.cx,py=nd._py!=null?nd._py:nd.cy;
    if(nd.sel){
      ctx.beginPath();
      for(var a=0;a<9;a++){
        var ang=a/9*6.283,rr=Rv+2+Math.sin(t*3.2+nd.phase+a*2.4)*1.6;
        var vx=px+Math.cos(ang)*rr,vy=py+Math.sin(ang)*rr;
        if(a)ctx.lineTo(vx,vy);else ctx.moveTo(vx,vy);
      }
      ctx.closePath();
      ctx.fillStyle='#d7f463';ctx.fill();
      ctx.strokeStyle='#eaffb0';ctx.lineWidth=2.5;ctx.stroke();
    }else if(nd.mutation){
      var mt=nd.mutation.type;
      ctx.beginPath();ctx.arc(px,py,Rv+1,0,6.283);
      ctx.fillStyle=mt==='add'?'rgba(126,226,195,.94)':mt==='merge'?'rgba(197,155,255,.92)':mt==='delete'?'rgba(255,138,157,.92)':'rgba(143,184,255,.92)';
      ctx.fill();
      ctx.strokeStyle=mt==='add'?'rgba(183,255,229,.72)':mt==='merge'?'rgba(227,200,255,.72)':mt==='delete'?'rgba(255,185,196,.72)':'rgba(205,220,250,.72)';
      ctx.lineWidth=1.7;ctx.stroke();
    }else{
      ctx.beginPath();ctx.arc(px,py,Rv,0,6.283);
      if(nd.filled){ctx.fillStyle='rgba(205,220,250,.92)';ctx.fill();ctx.strokeStyle='rgba(235,242,255,.5)';ctx.lineWidth=1.4;ctx.stroke()}
      else{ctx.fillStyle='rgba(74,88,128,.5)';ctx.fill();ctx.strokeStyle='rgba(120,135,175,.4)';ctx.lineWidth=1.2;ctx.stroke()}
    }
  }

  // ── labels ──
  ctx.textAlign='center';
  for(i=0;i<d.nodes.length;i++){
    nd=d.nodes[i];
    var px=nd._px!=null?nd._px:nd.cx,py=nd._py!=null?nd._py:nd.cy;
    ctx.font='650 10px Menlo,monospace';ctx.fillStyle='#93a0c4';
    ctx.fillText(nd.id,px,py+Rv+14);
    if(nd.score!=null){
      ctx.font='750 10px Menlo,monospace';
      ctx.fillStyle=nd.sel?'#d7f463':'#8fb8ff';
      ctx.fillText(Number(nd.score).toFixed(2),px,py-Rv-7);
    }
    ctx.font='9px Inter,sans-serif';
    ctx.fillStyle=nd.sel?'#d7f463':nd.mutation?(nd.mutation.type==='add'?'#7ee2c3':nd.mutation.type==='merge'?'#c59bff':nd.mutation.type==='delete'?'#ff8a9d':'#8fb8ff'):'#5f6b90';
    ctx.fillText(short((nd.mutation?nd.mutation.type+' · ':'')+(nd.name||nd.context||'(empty)'),34),px,py+Rv+27);
  }
}

function renderRewardBars(events){

  var b=s.lastBackwardState||null;

  var hn=$('hdr-net');if(hn)hn.textContent=activeName;

  renderHero(s,names,activeName,activeIds,b);

  // graphs: persistent views, update in place
  for(var ni=0;ni<names.length;ni++){
    var name=names[ni],net=s.networks[name];
    updateGraphView(name,net,name===activeName?s:null);
  }
  for(var k in graphViews){
    if(!s.networks[k]){graphViews[k].panel.remove();delete graphViews[k]}
  }

  renderSteps(s,activeIds,b);

  var dh='<details class="panel diag-details"'+diagAttrs('backward')+'><summary>↩ Semantic Backward 详情</summary><div class="diag-body">'+renderBackwardInner(b)+'</div></details>';
  var rawHtml=renderRawLLMResponse(s.backwardEvents||[]);
  if(rawHtml)dh+='<details class="panel diag-details"'+diagAttrs('raw')+'><summary>🧾 Raw LLM Response 诊断</summary><div class="diag-body">'+rawHtml+'</div></details>';
  setHTML(diagEl,dh);
  bindDiagState();

  setHTML(sideEl,renderFindings(s.backwardEvents||[])+renderMutationChart(s.backwardEvents||[])+renderOverview(s,activeName,s.networks[activeName],b)+renderRewardBars(s.backwardEvents||[]));
  var btn=$('btn-hist');
  if(btn)btn.onclick=function(){histExpanded=!histExpanded;if(lastS)render(lastS)};
}

async function poll(){
  try{
    var r=await fetch('/api/state?t='+Date.now(),{cache:'no-store'});
    var s=await r.json();
    lastS=s;render(s);
  }catch(e){
    if(!lastS)graphsEl.innerHTML='<div class="panel">ERROR: '+esc(e.message)+'</div>';
  }
  var c=$('hdr-clock');if(c)c.textContent=new Date().toLocaleTimeString('zh-CN',{hour12:false});
}

// rail icon scroll
var ricons=document.querySelectorAll('.ricon');
for(var ri=0;ri<ricons.length;ri++){
  ricons[ri].addEventListener('click',function(){
    for(var j=0;j<ricons.length;j++)ricons[j].classList.remove('active');
    this.classList.add('active');
    var t=$(this.getAttribute('data-target'));
    if(t)t.scrollIntoView({behavior:'smooth',block:'start'});
  });
}

// master animation loop: WebGL background + all graph canvases (adaptive 15–30 FPS)
initBG();
var lastDraw=0,fpsTarget=30,costAcc=0,costN=0,frameNo=0;
function loop(ts){
  requestAnimationFrame(loop);
  if(document.hidden)return;
  if(ts-lastDraw<1000/fpsTarget-2)return;
  var start=performance.now();
  var t=ts/1000;
  if(bgGL&&(frameNo++%2===0))bgGL.draw(t);
  for(var k in graphViews)drawGraph(graphViews[k],t);
  lastDraw=ts;
  costAcc+=performance.now()-start;costN++;
  if(costN>=48){
    var avg=costAcc/costN;costAcc=0;costN=0;
    if(avg>34&&fpsTarget>15)fpsTarget=15;
    else if(avg<16&&fpsTarget<30)fpsTarget=30;
  }
}
requestAnimationFrame(loop);

var evt;
try{evt=new EventSource('/events');evt.addEventListener('propagate_live',function(){poll()});evt.addEventListener('update',function(){poll()})}catch(e){}
poll();setInterval(poll,1500);
})();
</script>
</body>
</html>
